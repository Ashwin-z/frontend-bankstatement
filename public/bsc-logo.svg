<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17395c"/>
      <stop offset="100%" stop-color="#0f2840"/>
    </linearGradient>
    <linearGradient id="arrowGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8962c"/>
      <stop offset="100%" stop-color="#e8b84b"/>
    </linearGradient>
    <linearGradient id="arrowGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6e34"/>
      <stop offset="100%" stop-color="#25a04d"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="22" cy="22" r="22" fill="url(#bgGrad)"/>

  <!-- PDF document (top-left) -->
  <rect x="6" y="8" width="12" height="14" rx="1.5" fill="white" fill-opacity="0.18"/>
  <path d="M15 8v3.5H18" stroke="white" stroke-opacity="0.35" stroke-width="0.8" fill="none"/>
  <rect x="8" y="13" width="7" height="1" rx="0.5" fill="white" fill-opacity="0.55"/>
  <rect x="8" y="15.5" width="7" height="1" rx="0.5" fill="white" fill-opacity="0.55"/>
  <rect x="8" y="18" width="5" height="1" rx="0.5" fill="white" fill-opacity="0.55"/>

  <!-- Gold outer arrow -->
  <path d="M17 17 L25 17 L31 22 L25 27 L17 27 L17 17Z" fill="url(#arrowGold)"/>
  <!-- Green inner arrow -->
  <path d="M17.5 18.5 L24 18.5 L29.5 22 L24 25.5 L17.5 25.5 L17.5 18.5Z" fill="url(#arrowGreen)"/>
  <!-- Arrow shaft highlight -->
  <rect x="17.5" y="21" width="6" height="2" fill="white" fill-opacity="0.2"/>

  <!-- Spreadsheet / table (right side) -->
  <rect x="27" y="26" width="11" height="10" rx="1.5" fill="#1a6e34" fill-opacity="0.85"/>
  <!-- grid lines horizontal -->
  <line x1="27" y1="29.3" x2="38" y2="29.3" stroke="white" stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="27" y1="32.6" x2="38" y2="32.6" stroke="white" stroke-width="0.7" stroke-opacity="0.6"/>
  <!-- grid lines vertical -->
  <line x1="31" y1="26" x2="31" y2="36" stroke="white" stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="35" y1="26" x2="35" y2="36" stroke="white" stroke-width="0.7" stroke-opacity="0.6"/>

  <!-- BSC label at bottom -->
  <text
    x="22"
    y="41"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="7.5"
    font-weight="900"
    letter-spacing="0.6"
    fill="white"
  >BSC</text>
</svg>
